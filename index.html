<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background: linear-gradient(to right, #1877f2, #42a5f5);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:#fff;
            padding:40px;
            border-radius:10px;
            text-align:center;
            width:400px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            color:#1877f2;
            margin-bottom:15px;
        }

        p{
            color:#555;
            margin-bottom:30px;
            line-height:1.6;
        }

        .btn{
            display:block;
            width:100%;
            padding:12px;
            margin:10px 0;
            text-decoration:none;
            background:#1877f2;
            color:white;
            border-radius:5px;
            font-size:18px;
        }

        .btn:hover{
            background:#145dbf;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to ConnectHub</h1>

        <p>
            Connect with friends, share your thoughts,
            post photos and videos, and stay updated
            with the latest events from your community.
        </p>

       

        <a href="sign-up1.html" class="btn">Sign Up</a>
    </div>

</body>
</html>
