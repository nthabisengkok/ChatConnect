<!DOCTYPE html>
<html lang="en">
    <head>
    <title>ChatConnect00</title>
    <link rel="stylesheet" href="ChatConnect1.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    </head>

    <body>
        <div class="main">
            <div class="navbar">
                <div class="icon"></div>
               <h2 class="logo">ChatConnect</h2>
            </div>
            <div class="menu">
                
            </div>
            <div class="search">
                <input class="srch" type="search"  name=" " placeholder="type to text">
                <a href="#"> <button class="btn">search</button></a>
            </div>
            <div class="content">
                <h1>Welcome to <br><span>ChatConnect</span><br></h1>
               <p class="par"> Chatconnect is a platform for connecting people together.<br> this platform provides opportunities for networking,<br>learning, and career development.
           </p>
            </div>

            <div class="form">
            <h2>login here</h2>
            <input type="Name" name="name" placeholder="enter name">
            <input type="UserNumber" name="user number" placeholder="enter Usernumber">
            <select name="Title">
                <option value="Mr">Mr</option>
                <option value="Mrs">Mrs</option>
                <option value="Miss">Miss</option>
                <option value="Dr">Dr</option>
               
            </select>
            <input type="email" name="email" placeholder="enter Email here">
            <input type="password" name=" " placeholder="enter password here">
            <button class="btnn" id="loginBtn" onclick="window.location.href='profile.html'">
    Login
</button>

            <p class="link">Don't have an account?</p><br>
            <a href="#"> sign up</a>
           
            </div>
        </div>

    <script>
        $(document).ready(function () {
            $('#loginBtn').on('click', function (e) {
                e.preventDefault();

                var name     = $('input[name="name"]').val().trim();
                var studNum  = $('input[name="student number"]').val().trim();
                var campus   = $('select[name="Campus/DL"]').val().trim();
                var email    = $('input[name="email"]').val().trim();
                var password = $('input[name=" "]').val().trim();

                if (!name || !studNum || !campus || !email || !password) {
                    alert('Please fill in all fields before logging in.');
                    return;
                }

                window.location.href = 'profile.html';
            });
        });
    </script>
    </body>

    
</html>
